<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu bản thân - Dương Viết Nghĩa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .profile-card { max-width: 500px; margin: 50px auto; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-bg { background: linear-gradient(135deg, #007bff, #6610f2); height: 100px; border-radius: 15px 15px 0 0; }
        .avatar { width: 120px; height: 120px; margin-top: -60px; border: 5px solid white; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <div class="card profile-card text-center">
        <div class="header-bg"></div>
        <div class="card-body">
            <img src="https://via.placeholder.com/150" alt="Avatar" class="avatar mb-3 bg-light">
            
            <h2 class="card-title fw-bold text-primary">Dương Viết Nghĩa</h2>
            <p class="text-muted mb-4">Sinh viên Công nghệ Thông tin</p>
            
            <div class="text-start px-4">
                <p><strong>🔹 MSSV:</strong> 2280602064</p>
                <p><strong>🔹 Ngành:</strong> Công nghệ Thông tin</p>
                <p><strong>🔹 Chuyên ngành:</strong> Công nghệ phần mềm</p>
                <p><strong>🔹 Mục tiêu:</strong> Trở thành một lập trình viên Fullstack với chuyên môn về Java Spring Boot và Docker.</p>
            </div>
            
            <hr>
            <div class="d-grid gap-2 d-md-block">
                <button class="btn btn-outline-primary btn-sm">Portfolio</button>
                <button class="btn btn-primary btn-sm px-4">Liên hệ</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
