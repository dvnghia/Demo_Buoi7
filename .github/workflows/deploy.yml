name: Deploy Spring Boot to Docker Hub

on:
  push:
    branches: [ "main" ] # Chạy khi đẩy code lên nhánh main

jobs:
  build_and_push_docker:
    runs-on: ubuntu-latest # Chạy trên máy chủ Ubuntu của GitHub

    steps:
      # Bước 1: Lấy mã nguồn từ Github
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      # Bước 2: Đăng nhập vào Docker Hub bằng username và token
      - name: Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: dvnghia
          password: ${{ secrets.DOCKER_TOKEN }}

      # Bước 3: Build và Push Image lên Docker Hub
      - name: Build và push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: dvnghia/duanjava:latest
