name: Build & Push Docker image

on:
  push:
    branches: ["main"]

permissions:
  contents: read

# Thêm cấu hình này để tắt cảnh báo và chuyển sang dùng Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Thiết lập builder tốt hơn cho docker buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1) Tự động đăng nhập Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: dvnghia
          password: ${{ secrets.DOCKER_TOKEN }}

      # 2) Tự động Build image từ Dockerfile và 3) Push lên Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            dvnghia/demo_bai7:latest
            dvnghia/demo_bai7:${{ github.sha }}
